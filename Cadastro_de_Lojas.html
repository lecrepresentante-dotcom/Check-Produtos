<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#2B2420;
    --title:#C1481B;
    --bg:#FBF6F1;
    --surface:#FFFFFF;
    --accent:#E2652B;
    --accent-dark:#B84F1F;
    --accent-soft:#FBEAE0;
    --warn:#B23A3A;
    --warn-dark:#8C2E2E;
    --line:#EAE0D5;
    --muted:#8A7A6E;
    --font-body:12px;
    --font-sub:10px;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Inter',system-ui,sans-serif;
    font-size:var(--font-body);
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3{font-family:'Sora',sans-serif;margin:0;color:var(--title);}
  .mono{font-family:'IBM Plex Mono',monospace;}
  button{font-family:inherit;cursor:pointer;}
  input,select,textarea{font-family:inherit;font-size:var(--font-body);}

  .app-shell{max-width:960px;margin:0 auto;padding:0 0 64px;}

  .app-bar{
    background:var(--ink);
    color:#F5E9DD;
    padding:18px 20px 14px;
    position:sticky;top:0;z-index:20;
  }
  .app-bar .title-row{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;}
  .app-bar h1{font-size:19px;color:#fff;letter-spacing:0.2px;}
  .app-bar .subtitle{font-size:var(--font-sub);color:#E7BE9C;text-transform:uppercase;letter-spacing:0.08em;}
  .sync-note{font-size:var(--font-sub);color:#D9B79A;margin-top:6px;max-width:640px;}

  .tabs{
    display:flex;gap:10px;padding:14px 20px;background:var(--surface);
    border-bottom:1px solid var(--line);
    align-items:center;position:relative;flex-wrap:wrap;
  }
  .segmented{
    display:inline-flex;background:var(--bg);border:1px solid var(--line);border-radius:999px;padding:3px;gap:2px;
  }
  .segmented .seg-btn{
    background:transparent;border:none;color:var(--muted);
    padding:8px 16px;font-size:var(--font-body);font-weight:600;border-radius:999px;
    white-space:nowrap;
  }
  .segmented .seg-btn.active{background:var(--accent);color:#fff;}

  .menu-wrap{position:relative;margin-left:auto;}
  .hamburger-btn{
    background:var(--surface);border:1px solid var(--line);color:var(--ink);
    padding:8px 14px;font-size:12px;font-weight:600;border-radius:999px;
    white-space:nowrap;display:flex;align-items:center;gap:6px;
  }
  .hamburger-btn.active{background:var(--accent-soft);border-color:var(--accent);color:var(--accent-dark);}
  .hamburger-btn .bars{font-size:15px;line-height:1;}
  .hamburger-btn .cur{font-size:var(--font-sub);font-weight:600;color:var(--accent-dark);}
  .dropdown-menu{
    position:absolute;top:calc(100% + 8px);right:0;background:var(--surface);
    border:1px solid var(--line);border-radius:12px;
    box-shadow:0 14px 30px rgba(43,36,32,0.16);min-width:230px;z-index:50;
    overflow:hidden;padding:6px;
  }
  .dropdown-group-label{
    font-size:9px;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);
    font-weight:700;padding:10px 10px 4px;
  }
  .dropdown-menu button{
    display:block;width:100%;text-align:left;background:none;border:none;
    padding:9px 10px;font-size:var(--font-body);color:var(--ink);border-radius:8px;
  }
  .dropdown-menu button:hover{background:var(--accent-soft);}
  .dropdown-menu button.active{color:var(--accent-dark);font-weight:700;background:var(--accent-soft);}
  .dropdown-divider{height:1px;background:var(--line);margin:6px 4px;}

  main{padding:18px 20px 40px;}

  .card{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:16px 16px 18px;
    margin-bottom:14px;
  }
  .section-title{
    font-size:var(--font-sub);
    text-transform:uppercase;
    letter-spacing:0.08em;
    color:var(--title);
    font-weight:700;
    margin-bottom:10px;
    display:flex;align-items:center;gap:8px;
    font-family:'Sora',sans-serif;
  }
  .section-title::before{
    content:"";width:14px;height:2px;background:var(--accent);display:inline-block;
  }

  .field-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px 14px;}
  .field-grid.single{grid-template-columns:1fr;}
  @media(max-width:640px){.field-grid{grid-template-columns:1fr;}}

  .field label{
    display:block;font-size:var(--font-sub);color:var(--muted);
    margin-bottom:4px;font-weight:600;letter-spacing:0.02em;
  }
  .field input[type=text],.field input[type=tel],.field input[type=email],
  .field input[type=date],.field select,.field textarea{
    width:100%;padding:8px 10px;border:1px solid var(--line);border-radius:7px;
    background:#FFFCF9;color:var(--ink);
  }
  .field textarea{resize:vertical;min-height:56px;}
  .field input:focus,.field select:focus,.field textarea:focus{
    outline:2px solid var(--accent);outline-offset:1px;border-color:var(--accent);
  }
  .field.required label::after{content:" *";color:var(--warn);}

  .addr-row{display:flex;gap:8px;align-items:flex-start;}
  .addr-row textarea{flex:1;}
  .btn{
    border:none;border-radius:7px;padding:8px 14px;font-size:var(--font-body);
    font-weight:600;display:inline-flex;align-items:center;gap:6px;
  }
  .btn-accent{background:var(--accent);color:#fff;}
  .btn-accent:hover{background:var(--accent-dark);}
  .btn-outline{background:transparent;border:1px solid var(--line);color:var(--ink);}
  .btn-outline:hover{border-color:var(--accent);color:var(--accent-dark);}
  .btn-warn{background:#fff;border:1px solid var(--warn);color:var(--warn);}
  .btn-warn:hover{background:var(--warn);color:#fff;}
  .btn-sm{padding:6px 10px;font-size:var(--font-sub);}
  .btn:disabled{opacity:0.55;cursor:not-allowed;}

  .btn-confirm-addr{white-space:nowrap;}
  .spinner{
    width:12px;height:12px;border-radius:50%;
    border:2px solid rgba(255,255,255,0.4);border-top-color:#fff;
    animation:spin .7s linear infinite;display:inline-block;
  }
  @keyframes spin{to{transform:rotate(360deg);}}

  .photo-row{display:flex;flex-wrap:wrap;gap:10px;margin-top:4px;align-items:flex-start;}
  .photo-thumb{
    position:relative;width:74px;height:74px;border-radius:8px;overflow:hidden;
    border:1px solid var(--line);background:#eee;flex:none;
  }
  .photo-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
  .photo-thumb .rm{
    position:absolute;top:2px;right:2px;background:rgba(22,50,58,0.75);color:#fff;
    border:none;border-radius:50%;width:18px;height:18px;font-size:11px;line-height:1;
  }
  /* Initial photo field: a clearly visible rectangular upload box */
  .photo-placeholder{
    width:100%;max-width:230px;min-height:96px;border-radius:10px;
    border:1.5px dashed var(--accent);background:#FBEAE0;color:var(--accent-dark);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:4px;text-align:center;padding:14px;flex:none;
  }
  .photo-placeholder:hover{background:#F6D9C7;}
  .photo-placeholder .ic{font-size:22px;line-height:1;}
  .photo-placeholder .txt{font-size:var(--font-sub);font-weight:600;}
  /* Circular add button: shown beside existing photos to add more, no limit */
  .photo-add-round{
    width:40px;height:40px;border-radius:50%;border:1.5px dashed var(--accent);
    background:#FBEAE0;color:var(--accent-dark);display:flex;align-items:center;
    justify-content:center;font-size:20px;font-weight:700;flex:none;align-self:center;
  }
  .photo-add-round:hover{background:#F6D9C7;}
  .photo-label{font-size:var(--font-sub);color:var(--muted);margin-bottom:6px;font-weight:600;}

  .form-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:6px;flex-wrap:wrap;}

  /* Manifest-style tag chips (signature element) */
  .tag-chip{
    display:inline-flex;align-items:center;gap:6px;
    border:1px dashed var(--line);border-radius:6px;padding:3px 8px 3px 6px;
    font-size:var(--font-sub);color:var(--muted);background:#FBF7F3;
  }
  .tag-chip .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);flex:none;}
  .tag-chip.mono span{font-family:'IBM Plex Mono',monospace;color:var(--ink);}

  .search-box{display:flex;gap:8px;margin-bottom:12px;}
  .search-box input{flex:1;padding:10px 12px;border:1px solid var(--line);border-radius:8px;font-size:var(--font-body);}
  .result-list{display:flex;flex-direction:column;gap:6px;max-height:340px;overflow-y:auto;}
  .result-item{
    display:flex;justify-content:space-between;align-items:center;gap:8px;
    padding:9px 12px;border:1px solid var(--line);border-radius:8px;background:#fff;
    text-align:left;width:100%;
  }
  .result-item:hover{border-color:var(--accent);}
  .result-item .name{font-weight:600;}
  .result-item .meta{color:var(--muted);font-size:var(--font-sub);}

  .empty-state{
    text-align:center;padding:36px 16px;color:var(--muted);
  }
  .empty-state .big{font-size:28px;margin-bottom:8px;}

  .ficha-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 18px;}
  @media(max-width:640px){.ficha-grid{grid-template-columns:1fr;}}
  .ficha-item .k{font-size:var(--font-sub);color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:0.06em;}
  .ficha-item .v{font-size:var(--font-body);color:var(--ink);margin-top:2px;word-break:break-word;}
  .ficha-item .v.empty{color:#B8ACA0;font-style:italic;}
  .ficha-header{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:12px;flex-wrap:wrap;}
  .ficha-header h2{font-size:17px;}
  .ficha-header .chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;}
  .ficha-photos{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px;}
  .ficha-photos img{width:74px;height:74px;object-fit:cover;border-radius:8px;border:1px solid var(--line);}

  .list-manager-add{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
  .list-manager-add input{flex:1;min-width:140px;padding:9px 11px;border:1px solid var(--line);border-radius:7px;}
  .list-manager-items{display:flex;flex-direction:column;gap:6px;}
  .list-manager-row{
    display:flex;justify-content:space-between;align-items:center;gap:8px;
    padding:8px 12px;border:1px solid var(--line);border-radius:8px;background:#fff;
  }
  .list-manager-row .txt{font-size:var(--font-body);}
  .list-manager-row .sub{font-size:var(--font-sub);color:var(--muted);font-family:'IBM Plex Mono',monospace;}

  .toast{
    position:fixed;bottom:18px;left:50%;transform:translateX(-50%);
    background:var(--ink);color:#fff;padding:10px 16px;border-radius:8px;
    font-size:var(--font-body);z-index:100;box-shadow:0 6px 18px rgba(0,0,0,0.2);
    opacity:0;pointer-events:none;transition:opacity .2s ease, transform .2s ease;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-4px);}

  .modal-overlay{
    position:fixed;inset:0;background:rgba(22,50,58,0.45);
    display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;
  }
  .modal-box{
    background:#fff;border-radius:12px;padding:20px;max-width:340px;width:100%;
  }
  .modal-box p{font-size:var(--font-body);margin:0 0 16px;}
  .modal-actions{display:flex;justify-content:flex-end;gap:8px;}

  .stat-strip{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:14px;}
  .stat-pill{
    background:var(--surface);border:1px solid var(--line);border-radius:8px;
    padding:8px 12px;display:flex;flex-direction:column;gap:2px;min-width:88px;
  }
  .stat-pill .n{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;color:var(--ink);}
  .stat-pill .l{font-size:var(--font-sub);color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;}

  .helptext{font-size:var(--font-sub);color:var(--muted);margin-top:4px;}

  /* Equipamentos (máquinas / balança) */
  .equip-block{grid-column:1/-1;padding:10px 12px;border:1px solid var(--line);border-radius:8px;background:#FFFCF9;}
  .equip-block label{margin-bottom:6px;}
  .equip-block select.possui{max-width:160px;}
  .equip-details{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;}
  .equip-details select{flex:1;min-width:130px;padding:8px 10px;border:1px solid var(--line);border-radius:7px;}
  .equip-details input[type=number]{width:120px;padding:8px 10px;border:1px solid var(--line);border-radius:7px;}

  /* Serviços */
  .servico-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px;}
  .servico-row .field{flex:1;min-width:150px;}
  .servico-list-item{
    display:flex;justify-content:space-between;align-items:flex-start;gap:10px;
    padding:10px 12px;border:1px solid var(--line);border-radius:8px;background:#fff;margin-bottom:6px;
  }
  .servico-list-item .main{font-weight:600;}
  .servico-list-item .meta{font-size:var(--font-sub);color:var(--muted);margin-top:2px;}
  .servico-list-item .notas{font-size:var(--font-sub);color:var(--ink);margin-top:4px;font-style:italic;}

  /* Relatório de Máquinas */
  .report-table{width:100%;border-collapse:collapse;font-size:var(--font-body);}
  .report-table th,.report-table td{text-align:left;padding:8px 10px;border-bottom:1px solid var(--line);}
  .report-table th{font-size:var(--font-sub);text-transform:uppercase;letter-spacing:0.05em;color:var(--muted);}
  .report-table td.num{text-align:right;font-family:'IBM Plex Mono',monospace;}
  .report-total-row td{font-weight:700;border-top:2px solid var(--ink);border-bottom:none;}

  @media print{
    .app-bar, .tabs, .no-print{display:none !important;}
    body{background:#fff;}
    .app-shell{max-width:100%;}
    main{padding:0;}
    .card{border:none;padding:0;margin-bottom:18px;}
  }
  .print-title{display:none;}
  @media print{ .print-title{display:block;font-size:16px;margin-bottom:10px;font-family:'Sora',sans-serif;} }
</style>
</head>

/* ===================== STORAGE HELPERS ===================== */
async function storeGet(key){
  try{
    const r = await window.storage.get(key, false);
    return r ? r.value : null;
  }catch(e){ return null; }
}
function sleep(ms){ return new Promise(resolve=>setTimeout(resolve, ms)); }
async function storeSet(key, value, attempt){
  attempt = attempt || 0;
  try{ await window.storage.set(key, value, false); return true; }
  catch(e){
    if(attempt < 4){ await sleep(400 * (attempt+1)); return storeSet(key, value, attempt+1); }
    console.error('storage set failed after retries', key, e);
    return false;
  }
}
async function storeDelete(key, attempt){
  attempt = attempt || 0;
  try{ await window.storage.delete(key, false); return true; }
  catch(e){
    if(attempt < 4){ await sleep(400 * (attempt+1)); return storeDelete(key, attempt+1); }
    return false;
  }
}
async function loadListKey(key){
  const raw = await storeGet(key);
  if(raw===null) return null;
  try{ return JSON.parse(raw); }catch(e){ return null; }
}

const SEED_CLIENTES_BY_ID = {};
SEED_CLIENTES.forEach(rec=>{ SEED_CLIENTES_BY_ID[rec.id] = rec; });

/* ===================== SEEDING ===================== */
async function ensureSeeded(){
  let m = await loadListKey('municipios-list');
  if(m===null){ m = SEED_MUNICIPIOS.slice(); await storeSet('municipios-list', JSON.stringify(m)); }
  municipiosList = m;

  let c = await loadListKey('classificacao-list');
  if(c===null){ c = SEED_CLASSIFICACAO.slice(); await storeSet('classificacao-list', JSON.stringify(c)); }
  classificacaoList = c;

  let r = await loadListKey('rotas-list');
  if(r===null){ r = SEED_ROTAS.slice(); await storeSet('rotas-list', JSON.stringify(r)); }
  rotasList = r;

  let idx = await loadListKey('clientes-index');
  if(idx===null){
    idx = SEED_CLIENTES.map(rec=>buildIndexEntry(rec));
    await storeSet('clientes-index', JSON.stringify(idx));
  }
  clientesIndex = idx;

  let s = await loadListKey('servicos-list');
  if(s===null){ s = []; await storeSet('servicos-list', JSON.stringify(s)); }
  servicosList = s;
}

/* Loads a client's full record, materializing it from the original spreadsheet
   seed on first access (instead of writing all records upfront on load). */
async function getClientRecord(id){
  const raw = await storeGet('cliente:'+id);
  if(raw){
    try{ return JSON.parse(raw); }catch(e){ /* fall through */ }
  }
  const seedRec = SEED_CLIENTES_BY_ID[id];
  if(seedRec){
    storeSet('cliente:'+id, JSON.stringify(seedRec)); // fire-and-forget, no need to block the view
    return seedRec;
  }
  return null;
}

/* ===================== IMAGE HANDLING ===================== */
function readAndCompressImage(file, maxWidth){
  maxWidth = maxWidth || 1000;
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onerror = ()=>reject(new Error('read fail'));
    reader.onload = ()=>{
      const img = new Image();
      img.onerror = ()=>reject(new Error('img fail'));
      img.onload = ()=>{
        let w = img.width, h = img.height;
        if(w > maxWidth){ h = Math.round(h * (maxWidth/w)); w = maxWidth; }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', 0.72));
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

        ${thumbs}

async function handlePhotoInput(evt, fieldKey){
  const files = Array.from(evt.target.files || []);
  if(!files.length) return;
  toast('Processando foto(s)…');
  for(const f of files){
    try{
      const dataUrl = await readAndCompressImage(f, 1000);
      draftImages[fieldKey].push(dataUrl);
    }catch(e){ console.error(e); }
  }
  evt.target.value = '';
  refreshPhotoRow(fieldKey);
}
function removePhoto(fieldKey, i){
  draftImages[fieldKey].splice(i,1);
  refreshPhotoRow(fieldKey);
}
function refreshPhotoRow(fieldKey){
  const row = document.getElementById('row_'+fieldKey);
  if(!row) return;
  const imgs = draftImages[fieldKey] || [];

async function confirmarEndereco(){
  const el = document.getElementById('f_endereco');
  const btn = document.getElementById('btnConfirmAddr');
  const original = (el.value || '').trim();
  if(!original){ toast('Digite ao menos parte do endereço antes de confirmar.'); return; }
  const originalLabel = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Confirmando…';
  try{
    const prompt = 'Você confirma e completa endereços brasileiros. A partir do texto abaixo, que pode estar incompleto ou abreviado, identifique o endereço real (pode pesquisar na web) e responda APENAS com o endereço completo formatado exatamente assim, sem nenhuma explicação ou texto adicional: Logradouro, Número - Bairro, Cidade - UF, CEP, Brasil. Se não encontrar o CEP ou algum dado, omita apenas essa parte mas mantenha o restante do formato. Texto informado: "' + original.replace(/"/g,"'") + '"';
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:300,
        messages:[{role:'user', content:prompt}],
        tools:[{type:'web_search_20250305', name:'web_search'}]
      })
    });
    const data = await resp.json();
    const text = (data.content || []).filter(b=>b.type==='text').map(b=>b.text||'').join(' ').trim();
    if(text){
      el.value = text;
      toast('Endereço confirmado.');
    }else{
      toast('Não foi possível confirmar o endereço agora. Tente novamente.');
    }
  }catch(e){
    console.error(e);
    toast('Erro ao confirmar endereço. Tente novamente em instantes.');
  }
  btn.disabled = false;
  btn.innerHTML = originalLabel;
}

function collectFormData(existingId){
  const ids = ['cliente','nomeFantasia','municipio','regiao','rota','classificacao','codLj','condPgto',

    'proprietario','cpfProp','identProp','anivProp','administrador','anivAdm','mimo',
    'maqSkylackPossui','maqSkylackTipo','maqSkylackQtd',
    'maqSkyfrotaPossui','maqSkyfrotaTipo','maqSkyfrotaQtd',
    'balancaPossui','balancaTipo','balancaQtd','obsEquipamentos'];
  const rec = { id: existingId || uid() };
  ids.forEach(k=>{
    const el = document.getElementById('f_'+k);
    rec[k] = el ? el.value.trim() : '';
  });
  rec.imagensInt = draftImages.imagensInt.slice();
  rec.imagensExt = draftImages.imagensExt.slice();
  rec.imagensGoogle = draftImages.imagensGoogle.slice();
  rec.imagensEquipamentos = draftImages.imagensEquipamentos.slice();
  rec.obsImagens = '';
  EQUIP_KEYS.forEach(k=>{
    if(rec[k+'Possui'] !== 'sim'){
      rec[k+'Tipo'] = '';
      rec[k+'Qtd'] = '';
    }
  });
  return rec;
}

async function submitClientForm(mode, existingId){
  const clienteEl = document.getElementById('f_cliente');
  if(!clienteEl.value.trim()){
    toast('Informe o nome do Cliente antes de salvar.');
    clienteEl.focus();
    return;
  }
  const rec = collectFormData(mode==='edit' ? existingId : null);
  await storeSet('cliente:'+rec.id, JSON.stringify(rec));
  if(mode==='edit'){
    const i = clientesIndex.findIndex(c=>c.id===rec.id);
    if(i>=0) clientesIndex[i] = buildIndexEntry(rec);
  }else{
    clientesIndex.push(buildIndexEntry(rec));
  }
  await storeSet('clientes-index', JSON.stringify(clientesIndex));
  toast(mode==='edit' ? 'Cliente atualizado.' : 'Cliente cadastrado.');
  if(mode==='edit'){
    consultaEditMode = false;
    consultaSelectedId = rec.id;
    renderContent();
  }else{
    resetCadastroForm();
  }
}

  const shown = q ? list : list.slice(0,25);
  let extra = (!q && list.length>25) ? `<div class="helptext" style="text-align:center;margin-top:6px;">Mostrando 25 de ${list.length}. Digite para refinar a busca.</div>` : '';

  if(parts.length!==3) return iso;
  return parts[2]+'/'+parts[1]+'/'+parts[0];
}

      </div>
      <table class="report-table">
        <thead><tr><th>Cliente</th><th>Serviço</th><th>Data</th><th>Status</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
      <div class="section-title" style="margin-top:18px;">Totais por Serviço</div>
      <table class="report-table">

function gerarPdfServicos(){
  const data = window.__relatorioServicosData;
  if(!data || !data.ordenados.length){ toast('Nada para gerar ainda.'); return; }

  const marginX = 40;
  const pageTop = 790, pageBottom = 50;
  const lineH = 15;
  const colX = { cliente:marginX, tipo:230, data:370, status:440 };

  let pages = [];
  let currentOps = [];
  let y = pageTop;

  function push(x, yy, text, opts){
    currentOps.push({x:x, y:yy, text:text, size:(opts&&opts.size)||9, bold: !!(opts&&opts.bold)});
  }
  function drawHeader(){
    push(colX.cliente, y, 'Cliente', {bold:true});
    push(colX.tipo, y, 'Servico', {bold:true});
    push(colX.data, y, 'Data', {bold:true});
    push(colX.status, y, 'Status', {bold:true});
    y -= lineH;
  }
  function newPage(withHeader){
    pages.push(currentOps);
    currentOps = [];
    y = pageTop;
    if(withHeader) drawHeader();
  }
  function ensureSpace(needed, withHeader){
    if(y - needed < pageBottom){ newPage(withHeader); }
  }

  push(marginX, y, 'Relatorio de Servicos', {size:15, bold:true});
  y -= 20;
  push(marginX, y, 'Rota Norte - Belem / Para', {size:9});
  y -= 24;
  drawHeader();

  data.ordenados.forEach(s=>{
    ensureSpace(lineH, true);
    push(colX.cliente, y, String(s.clienteNome).slice(0,32));
    push(colX.tipo, y, s.tipo);
    push(colX.data, y, formatDateBR(s.data) || '-');
    push(colX.status, y, s.status || '-');
    y -= lineH;
    if(s.notas && s.notas.trim()){
      ensureSpace(lineH, true);
      const words = String(s.notas).replace(/\r/g,'').split(/\s+/);
      let line = '', wrapped = [];
      words.forEach(w=>{
        if((line+' '+w).trim().length > 100){ wrapped.push(line.trim()); line = w; }
        else line = (line+' '+w).trim();
      });
      if(line) wrapped.push(line);
      wrapped.forEach(ln=>{
        ensureSpace(12, true);
        push(colX.cliente, y, '  '+ln, {size:8});
        y -= 12;
      });
    }
  });

  ensureSpace(lineH*(SERVICO_TIPOS.length+2), false);
  y -= 10;
  push(marginX, y, 'Totais por Servico', {size:12, bold:true});
  y -= 18;
  SERVICO_TIPOS.forEach(t=>{
    ensureSpace(lineH, false);
    push(colX.cliente, y, t, {bold:true});
    push(colX.tipo, y, String(data.totals[t]||0));
    y -= lineH;
  });

  pages.push(currentOps);
  const bytes = buildPdfBytes(pages);
  downloadPdfBytes(bytes, 'relatorio_servicos.pdf');
  toast('PDF gerado.');
}

            ${gi>0 ? '<div class="dropdown-divider"></div>' : ''}
            <div class="dropdown-group-label">${esc(g.label)}</div>
            ${g.items.map(t=>`<button class="${activeTab===t.id?'active':''}" onclick="switchTab('${t.id}')">${t.label}</button>`).join('')}
          `).join('')}
        </div>
      ` : ''}
    </div>
  `;
}
function toggleMenu(evt){
  evt.stopPropagation();
  menuOpen = !menuOpen;
  renderTabs();
  if(menuOpen){
    setTimeout(()=>{
      document.addEventListener('click', closeMenuOnOutsideClick, {once:true});
    },0);
  }
}
function closeMenuOnOutsideClick(){
  if(menuOpen){ menuOpen = false; renderTabs(); }
}
function switchTab(id){
  activeTab = id;
  menuOpen = false;
  if(id==='cadastrar'){ draftImages = { imagensInt:[], imagensExt:[], imagensGoogle:[], imagensEquipamentos:[], imagensServico:[] }; }
  if(id==='consultar'){ consultaSelectedId = null; consultaEditMode = false; }
  if(id==='servicos'){ draftImages.imagensServico = []; servicoEditId = null; }
  renderTabs();
  renderContent();
}

async function renderContent(){
  const el = document.getElementById('content');
  if(activeTab==='cadastrar'){
    el.innerHTML = statStrip() + clientFormHTML({}, 'new');
  }else if(activeTab==='consultar'){
    if(consultaSelectedId){
      el.innerHTML = '<div class="card"><div class="empty-state">Carregando…</div></div>';
      el.innerHTML = await renderFicha(consultaSelectedId);
    }else{
      el.innerHTML = renderConsultarTab();
    }
  }else if(activeTab==='municipios'){
    el.innerHTML = renderMunicipiosTab();
  }else if(activeTab==='classificacao'){
    el.innerHTML = renderClassificacaoTab();
  }else if(activeTab==='rotas'){
    el.innerHTML = renderRotasTab();
  }else if(activeTab==='relatorio'){
    el.innerHTML = '<div class="card"><div class="empty-state">Calculando relatório…</div></div>';
    el.innerHTML = await renderRelatorioMaquinas();
  }else if(activeTab==='servicos'){
    el.innerHTML = renderServicosTab();
  }else if(activeTab==='relatorioServicos'){
    el.innerHTML = renderRelatorioServicos();
  }
}
function statStrip(){
  return `
    <div class="stat-strip">
      <div class="stat-pill"><div class="n">${clientesIndex.length}</div><div class="l">Lojas cadastradas</div></div>
      <div class="stat-pill"><div class="n">${municipiosList.length}</div><div class="l">Municípios</div></div>
      <div class="stat-pill"><div class="n">${rotasList.length}</div><div class="l">Rotas</div></div>
    </div>
  `;
}

/* ===================== RELATÓRIO DE MÁQUINAS ===================== */
async function renderRelatorioMaquinas(){
  const linhas = [];
  let totalSkylack = 0, totalSkyfrota = 0, totalBalanca = 0, totalMaquinas = 0;
  clientesIndex.forEach(rec=>{
    let qtdSkylack = (rec.maqSkylackPossui==='sim') ? (parseFloat(rec.maqSkylackQtd)||0) : 0;
    let qtdSkyfrota = (rec.maqSkyfrotaPossui==='sim') ? (parseFloat(rec.maqSkyfrotaQtd)||0) : 0;
    let qtdBalanca = (rec.balancaPossui==='sim') ? (parseFloat(rec.balancaQtd)||0) : 0;
    const totalMaquinasLinha = qtdSkylack + qtdSkyfrota; // "Total" = só máquinas, sem a balança
    if(qtdSkylack + qtdSkyfrota + qtdBalanca > 0){
      linhas.push({
        cliente: rec.cliente, municipio: rec.municipio,
        qtdSkylack, qtdSkyfrota, qtdBalanca, totalMaquinas: totalMaquinasLinha,
        obs: rec.obsEquipamentos || ''
      });
      totalSkylack += qtdSkylack;
      totalSkyfrota += qtdSkyfrota;
      totalBalanca += qtdBalanca;
      totalMaquinas += totalMaquinasLinha;
    }
  });
  linhas.sort((a,b)=>a.cliente.localeCompare(b.cliente,'pt-BR'));

  if(!linhas.length){
    return `
      <div class="card">
        <div class="section-title">Relatório de Máquinas e Balanças</div>
        <div class="empty-state">Nenhuma loja com equipamentos cadastrados ainda.<br><span class="helptext">Cadastre ou edite uma loja e marque "Sim" em Máquina/Balança para que ela apareça aqui.</span></div>
      </div>
    `;
  }

  const rowsHTML = (esc_)=>linhas.map(l=>`
    <tr>
      <td>${esc_(l.cliente)}<br><span class="helptext">${esc_(l.municipio||'')}</span></td>
      <td class="num">${l.qtdSkylack||''}</td>
      <td class="num">${l.qtdSkyfrota||''}</td>
      <td class="num">${l.qtdBalanca||''}</td>
      <td class="num"><strong>${l.totalMaquinas}</strong></td>
    </tr>
  `).join('');

  const comObs = linhas.filter(l=>l.obs && l.obs.trim());
  const obsSectionHTML = (esc_)=>comObs.length ? `
    <div class="section-title" style="margin-top:18px;">Observações</div>
    <div class="ficha-grid">
      ${comObs.map(l=>`<div class="ficha-item"><div class="k">${esc_(l.cliente)}</div><div class="v">${esc_(l.obs).replace(/\n/g,'<br>')}</div></div>`).join('')}
    </div>
  ` : '';

  const tableHTML = `
    <table class="report-table">
      <thead>
        <tr>
          <th>Loja</th><th class="num">Skylack</th><th class="num">Skyfrota</th><th class="num">Balança</th><th class="num">Total Máquinas</th>
        </tr>
      </thead>
      <tbody>
        ${rowsHTML(esc)}
        <tr class="report-total-row">
          <td>Total geral (${linhas.length} loja${linhas.length===1?'':'s'})</td>
          <td class="num">${totalSkylack}</td>
          <td class="num">${totalSkyfrota}</td>
          <td class="num">${totalBalanca}</td>
          <td class="num">${totalMaquinas}</td>
        </tr>
      </tbody>
    </table>
    ${obsSectionHTML(esc)}
  `;

  window.__relatorioData = { linhas, totalSkylack, totalSkyfrota, totalBalanca, totalMaquinas };

  return `
    <div class="card">
      <div class="section-title">Relatório de Máquinas e Balanças</div>
      <div class="form-actions no-print" style="justify-content:flex-start;margin-bottom:12px;">
        <button class="btn btn-accent btn-sm" onclick="gerarPdfRelatorio()">Gerar PDF</button>
      </div>
      ${tableHTML}
      <div class="helptext no-print" style="margin-top:10px;">O PDF é baixado direto para o seu aparelho — depois é só compartilhar o arquivo com quem precisar.</div>
    </div>
  `;
}

/* ===================== PDF GENERATION (no external libraries) ===================== */
function pdfAsciiBytes(str){
  const bytes = [];
  for(let i=0;i<str.length;i++) bytes.push(str.charCodeAt(i) & 0xFF);
  return bytes;
}
function pdfTextBytes(str){
  const escaped = String(str).replace(/\\/g,'\\\\').replace(/\(/g,'\\(').replace(/\)/g,'\\)');
  const bytes = [];
  for(let i=0;i<escaped.length;i++){
    let c = escaped.charCodeAt(i);
    if(c>255) c = 63; // fallback '?' for unsupported characters
    bytes.push(c);
  }
  return bytes;
}
function buildPdfBytes(pagesOps){
  const numPages = pagesOps.length;
  let nextNum = 1;
  const catalogNum = nextNum++;
  const pagesNum = nextNum++;
  const pageNums = []; for(let i=0;i<numPages;i++) pageNums.push(nextNum++);
  const contentNums = []; for(let i=0;i<numPages;i++) contentNums.push(nextNum++);
  const fontRegNum = nextNum++;
  const fontBoldNum = nextNum++;

  function obj(num, bodyBytes){
    return pdfAsciiBytes(num+' 0 obj\n').concat(bodyBytes, pdfAsciiBytes('\nendobj\n'));
  }

  const allObjs = {};
  allObjs[catalogNum] = obj(catalogNum, pdfAsciiBytes('<< /Type /Catalog /Pages '+pagesNum+' 0 R >>'));
  const kids = pageNums.map(n=>n+' 0 R').join(' ');
  allObjs[pagesNum] = obj(pagesNum, pdfAsciiBytes('<< /Type /Pages /Kids ['+kids+'] /Count '+numPages+' >>'));

  for(let i=0;i<numPages;i++){
    const pnum = pageNums[i], cnum = contentNums[i];
    const pageDict = '<< /Type /Page /Parent '+pagesNum+' 0 R /MediaBox [0 0 595 842] '+
      '/Resources << /Font << /F1 '+fontRegNum+' 0 R /F2 '+fontBoldNum+' 0 R >> >> /Contents '+cnum+' 0 R >>';
    allObjs[pnum] = obj(pnum, pdfAsciiBytes(pageDict));

    let streamBytes = [];
    pagesOps[i].forEach(op=>{
      const fontName = op.bold ? 'F2' : 'F1';
      const size = op.size || 9;
      streamBytes = streamBytes.concat(pdfAsciiBytes('BT /'+fontName+' '+size+' Tf 1 0 0 1 '+op.x+' '+op.y+' Tm ('));
      streamBytes = streamBytes.concat(pdfTextBytes(op.text));
      streamBytes = streamBytes.concat(pdfAsciiBytes(') Tj ET\n'));
    });
    const streamHeader = pdfAsciiBytes('<< /Length '+streamBytes.length+' >>\nstream\n');
    const streamFooter = pdfAsciiBytes('\nendstream');
    allObjs[cnum] = obj(cnum, streamHeader.concat(streamBytes, streamFooter));
  }

  allObjs[fontRegNum] = obj(fontRegNum, pdfAsciiBytes('<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica /Encoding /WinAnsiEncoding >>'));
  allObjs[fontBoldNum] = obj(fontBoldNum, pdfAsciiBytes('<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica-Bold /Encoding /WinAnsiEncoding >>'));

  let fileBytes = pdfAsciiBytes('%PDF-1.4\n');
  const offsets = {};
  const allNums = [catalogNum, pagesNum].concat(pageNums, contentNums, [fontRegNum, fontBoldNum]).sort((a,b)=>a-b);
  allNums.forEach(num=>{
    offsets[num] = fileBytes.length;
    fileBytes = fileBytes.concat(allObjs[num]);
  });

  const xrefStart = fileBytes.length;
  const maxNum = allNums[allNums.length-1];
  let xref = 'xref\n0 '+(maxNum+1)+'\n0000000000 65535 f \n';
  for(let n=1;n<=maxNum;n++){
    xref += String(offsets[n]).padStart(10,'0')+' 00000 n \n';
  }
  fileBytes = fileBytes.concat(pdfAsciiBytes(xref));
  fileBytes = fileBytes.concat(pdfAsciiBytes('trailer\n<< /Size '+(maxNum+1)+' /Root '+catalogNum+' 0 R >>\nstartxref\n'+xrefStart+'\n%%EOF'));

  return new Uint8Array(fileBytes);
}
function downloadPdfBytes(bytes, filename){
  const blob = new Blob([bytes], {type:'application/pdf'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url), 4000);
}

function gerarPdfRelatorio(){
  const data = window.__relatorioData;
  if(!data || !data.linhas.length){ toast('Nada para gerar ainda.'); return; }

  const marginX = 40;
  const pageTop = 790, pageBottom = 50;
  const lineH = 15;
  const colX = { loja:marginX, skylack:320, skyfrota:390, balanca:460, total:520 };

  let pages = [];
  let currentOps = [];
  let y = pageTop;

  function push(x, yy, text, opts){
    currentOps.push({x:x, y:yy, text:text, size:(opts&&opts.size)||9, bold: !!(opts&&opts.bold)});
  }
  function drawTableHeader(){
    push(colX.loja, y, 'Loja', {bold:true});
    push(colX.skylack, y, 'Skylack', {bold:true});
    push(colX.skyfrota, y, 'Skyfrota', {bold:true});
    push(colX.balanca, y, 'Balanca', {bold:true});
    push(colX.total, y, 'Tot. Maq.', {bold:true});
    y -= lineH;
  }
  function newPage(withHeader){
    pages.push(currentOps);
    currentOps = [];
    y = pageTop;
    if(withHeader) drawTableHeader();
  }
  function ensureSpace(needed, withHeader){
    if(y - needed < pageBottom){ newPage(withHeader); }
  }

  push(marginX, y, 'Relatorio de Maquinas e Balancas', {size:15, bold:true});
  y -= 20;
  push(marginX, y, 'Rota Norte - Belem / Para', {size:9});
  y -= 24;
  drawTableHeader();

  data.linhas.forEach(l=>{
    ensureSpace(lineH, true);
    push(colX.loja, y, String(l.cliente).slice(0,40));
    push(colX.skylack, y, l.qtdSkylack ? String(l.qtdSkylack) : '-');
    push(colX.skyfrota, y, l.qtdSkyfrota ? String(l.qtdSkyfrota) : '-');
    push(colX.balanca, y, l.qtdBalanca ? String(l.qtdBalanca) : '-');
    push(colX.total, y, String(l.totalMaquinas), {bold:true});
    y -= lineH;
  });

  ensureSpace(lineH*2, false);
  y -= 6;
  push(colX.loja, y, 'Total geral ('+data.linhas.length+' loja'+(data.linhas.length===1?'':'s')+')', {bold:true});
  push(colX.skylack, y, String(data.totalSkylack), {bold:true});
  push(colX.skyfrota, y, String(data.totalSkyfrota), {bold:true});
  push(colX.balanca, y, String(data.totalBalanca), {bold:true});
  push(colX.total, y, String(data.totalMaquinas), {bold:true});
  y -= 28;

  const comObs = data.linhas.filter(l=>l.obs && l.obs.trim());
  if(comObs.length){
    ensureSpace(24, false);
    push(marginX, y, 'Observacoes', {size:12, bold:true});
    y -= 18;
    comObs.forEach(l=>{
      ensureSpace(14, false);
      push(marginX, y, l.cliente, {bold:true});
      y -= 12;
      const words = String(l.obs).replace(/\r/g,'').split(/\s+/);
      let line = '', wrapped = [];
      words.forEach(w=>{
        if((line+' '+w).trim().length > 95){ wrapped.push(line.trim()); line = w; }
        else line = (line+' '+w).trim();
      });
      if(line) wrapped.push(line);
      wrapped.forEach(ln=>{
        ensureSpace(12, false);
        push(marginX, y, ln);
        y -= 12;
      });
      y -= 8;
    });
  }
  pages.push(currentOps);

  const bytes = buildPdfBytes(pages);
  downloadPdfBytes(bytes, 'relatorio_maquinas_balancas.pdf');
  toast('PDF gerado.');
}

/* ===================== INIT ===================== */
async function initApp(){
  renderTabs();
  document.getElementById('content').innerHTML = '<div class="card"><div class="empty-state">Carregando cadastro…</div></div>';
  await ensureSeeded();
  renderContent();
}
initApp();
